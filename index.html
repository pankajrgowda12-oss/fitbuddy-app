<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBuddy AI Platform</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <style>
        html {
            background-color: #020617;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #020617;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        .page-animation {
            animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="text-white">
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const API = "https://fitbuddy-backend-qgug.onrender.com";

        
        function HomePage({ onNavigate }) {
            const modules = [
                { t: "Workout Planner", d: "Builds an intensive, high-performance weekly split system." },
                { t: "Diet Recommender", d: "Precision clean eating meal structures matching physical output goals." },
                { t: "Behavior Predictor", d: "Advanced data adherence indicators and fatigue risk forecasting." },
                { t: "Gym Finder", d: "Maps nearby operational weight rooms and functional facilities." }
            ];

            return e("div", { className: "page-animation space-y-12" },
                e("section", { className: "text-center py-12 bg-gradient-to-b from-black via-slate-950 to-slate-950 rounded-2xl border border-slate-900" },
                    e("h1", { className: "text-5xl font-black tracking-tight mb-4 text-white" }, "Virtual Gym Buddy"),
                    e("p", { className: "text-slate-400 max-w-xl mx-auto text-base leading-relaxed" },
                        "Welcome back to your central hub. Switch modules from the large control options below or navigate directly through the top status bar."
                    ),
                    e("div", { className: "mt-6 flex justify-center gap-4" },
                        e("button", { onClick: () => onNavigate("Chatbot"), className: "bg-cyan-400 text-slate-950 font-extrabold text-sm px-6 py-3 rounded-lg hover:bg-cyan-300 transition shadow-lg shadow-cyan-950/40 cursor-pointer" }, "Launch Chatbot Engine"),
                        e("button", { onClick: () => onNavigate("Pose AI"), className: "bg-slate-900 border border-slate-800 text-white font-bold text-sm px-6 py-3 rounded-lg hover:bg-slate-800 transition cursor-pointer" }, "Run Video Calibration")
                    )
                ),
                e("div", null,
                    e("h2", { className: "text-2xl font-black mb-2 text-center" }, "Core Feature Suite"),
                    e("p", { className: "text-center text-slate-500 text-sm mb-8" }, "Direct structural analytics nodes available instantly."),
                    e("div", { className: "grid grid-cols-1 md:grid-cols-2 gap-6" },
                        modules.map((m, i) => 
                            e("div", { 
                                key: i, 
                                onClick: () => onNavigate(m.t),
                                className: "bg-slate-900/40 p-6 rounded-xl border border-slate-900 hover:border-cyan-400/50 hover:bg-slate-900 transition-all duration-300 cursor-pointer group shadow-lg" 
                            },
                                e("h3", { className: "font-black text-lg mb-2 text-cyan-400 group-hover:text-cyan-300" }, m.t),
                                e("p", { className: "text-slate-400 text-sm leading-relaxed" }, m.d)
                            )
                        )
                    )
                )
            );
        }

        function ProfilePage() {
            return e("div", { className: "page-animation max-w-2xl mx-auto bg-slate-900/60 border border-slate-800 rounded-2xl p-8 shadow-2xl" },
                e("div", { className: "flex items-center gap-6 border-b border-slate-800 pb-6 mb-6" },
                    e("div", { className: "w-20 h-20 bg-gradient-to-tr from-cyan-600 to-blue-500 rounded-full flex items-center justify-center text-2xl font-black text-white shadow-xl shadow-cyan-950/50" }, "PK"),
                    e("div", null,
                        e("h2", { className: "text-2xl font-black text-white" }, "Pankaj R Gowda"),
                        e("p", { className: "text-cyan-400 font-mono text-xs uppercase tracking-wider" }, "Premium Core Tier Account")
                    )
                ),
                e("div", { className: "space-y-4" },
                    e("h3", { className: "text-sm font-bold text-slate-400 uppercase tracking-widest" }, "Physical Parameters"),
                    e("div", { className: "grid grid-cols-2 gap-4" },
                        e("div", { className: "bg-slate-950 p-4 rounded-xl border border-slate-900" }, e("div", { className: "text-xs text-slate-500" }, "Height Metric"), e("div", { className: "text-lg font-bold font-mono" }, "178 cm")),
                        e("div", { className: "bg-slate-950 p-4 rounded-xl border border-slate-900" }, e("div", { className: "text-xs text-slate-500" }, "Current Scale Mass"), e("div", { className: "text-lg font-bold font-mono" }, "76 kg"))
                    ),
                    e("div", { className: "bg-slate-950 p-4 rounded-xl border border-slate-900 space-y-3" },
                        e("div", { className: "flex justify-between text-sm" }, e("span", { className: "text-slate-400" }, "Systemic Goal Blueprint:"), e("span", { className: "text-cyan-400 font-bold" }, "Lean Muscle Hypertrophy")),
                        e("div", { className: "flex justify-between text-sm" }, e("span", { className: "text-slate-400" }, "Weekly Routine Framework:"), e("span", null, "3-Day Compound Split")),
                        e("div", { className: "flex justify-between text-sm" }, e("span", { className: "text-slate-400" }, "Database Node Token:"), e("span", { className: "font-mono text-xs text-slate-500" }, "usr_942x_active"))
                    )
                )
            );
        }

        function TrackerPage() {
            const [water, setWater] = React.useState(2.4);
            const [workouts, setWorkouts] = React.useState(["15,000kg Heavy Squat Session", "45-Min Zone 2 Cardio Frame"]);

            return e("div", { className: "page-animation max-w-3xl mx-auto space-y-6" },
                e("div", { className: "bg-slate-900/60 border border-slate-800 rounded-2xl p-6" },
                    e("h2", { className: "text-2xl font-black text-white mb-2" }, "Biometric Performance Tracker"),
                    e("p", { className: "text-xs text-slate-500" }, "Manual verification and live log monitoring.")
                ),
                e("div", { className: "grid grid-cols-1 md:grid-cols-2 gap-6" },
                    e("div", { className: "bg-slate-900/40 border border-slate-800 p-6 rounded-xl space-y-4" },
                        e("h3", { className: "text-base font-bold text-cyan-400" }, "Hydration Tracking Counter"),
                        e("div", { className: "text-4xl font-black font-mono" }, water.toFixed(1), " / 4.0 L"),
                        e("div", { className: "w-full bg-slate-950 h-3 rounded-full overflow-hidden border border-slate-800" },
                            e("div", { className: "bg-cyan-400 h-full transition-all duration-300", style: { width: `${(water / 4) * 100}%` } })
                        ),
                        e("button", { onClick: () => setWater(w => Math.min(w + 0.2, 4)), className: "w-full bg-slate-800 text-xs font-bold py-2 rounded-lg border border-slate-700 hover:bg-slate-700 transition" }, "+ Add 200ml Intake Fluid")
                    ),
                    e("div", { className: "bg-slate-900/40 border border-slate-800 p-6 rounded-xl space-y-4" },
                        e("h3", { className: "text-base font-bold text-emerald-400" }, "Completed Activity Journal"),
                        e("div", { className: "space-y-2" },
                            workouts.map((w, idx) => e("div", { key: idx, className: "bg-slate-950 p-2.5 rounded border border-slate-900 text-xs font-medium" }, "✓ ", w))
                        )
                    )
                )
            );
        }

        function BmiPage() {
            const [w, setW] = React.useState(76);
            const [h, setH] = React.useState(178);
            
            const bmi = (w / ((h / 100) * (h / 100))).toFixed(1);
            let status = "Normal Weight";
            let color = "text-emerald-400";
            if (bmi >= 25) { status = "Overweight Threshold"; color = "text-amber-400"; }
            if (bmi < 18.5) { status = "Underweight Threshold"; color = "text-sky-400"; }

            return e("div", { className: "page-animation max-w-xl mx-auto bg-slate-900/60 border border-slate-800 rounded-2xl p-6 space-y-6" },
                e("div", null,
                    e("h2", { className: "text-xl font-black" }, "Interactive Body Mass Index Calculator"),
                    e("p", { className: "text-xs text-slate-500" }, "Adjust variables to analyze composition ratios.")
                ),
                e("div", { className: "space-y-4" },
                    e("div", null,
                        e("div", { className: "flex justify-between text-xs mb-1" }, e("span", { className: "text-slate-400" }, "Weight mass parameter:"), e("span", { className: "font-mono font-bold" }, w, " kg")),
                        e("input", { type: "range", min: "40", max: "150", value: w, onChange: e => setW(Number(e.target.value)), className: "w-full accent-cyan-400" })
                    ),
                    e("div", null,
                        e("div", { className: "flex justify-between text-xs mb-1" }, e("span", { className: "text-slate-400" }, "Height stature metric:"), e("span", { className: "font-mono font-bold" }, h, " cm")),
                        e("input", { type: "range", min: "120", max: "220", value: h, onChange: e => setH(Number(e.target.value)), className: "w-full accent-cyan-400" })
                    )
                ),
                e("div", { className: "bg-slate-950 p-4 rounded-xl border border-slate-900 text-center" },
                    e("div", { className: "text-xs text-slate-500 font-medium" }, "Calculated Scale Metric Value"),
                    e("div", { className: `text-4xl font-black font-mono my-1 ${color}` }, bmi),
                    e("div", { className: `text-xs font-bold uppercase tracking-wider ${color}` }, status)
                )
            );
        }

        function ChatbotPage() {
            const [msgs, setMsgs] = React.useState([{ who: "bot", text: "Welcome to FitBuddy. Ask any question regarding your workout or diet routine below." }]);
            const [input, setInput] = React.useState("");
            const [loading, setLoading] = React.useState(false);
            const endRef = React.useRef(null);

            React.useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

            async function send(txt) {
                const messageToSend = txt || input;
                if (!messageToSend.trim() || loading) return;
                if (!txt) setInput("");
                setLoading(true);
                setMsgs(l => l.concat([{ who: "user", text: messageToSend }]));

                try {
                    const response = await fetch(`${API}/ask`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message: messageToSend })
                    });
                    if (!response.ok) throw new Error();
                    const reader = response.body.getReader();
                    const dec = new TextDecoder();
                    let acc = "";
                    setMsgs(l => l.concat([{ who: "bot", text: "..." }]));
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        acc += dec.decode(value, { stream: true });
                        setMsgs(l => {
                            const copy = [...l];
                            copy[copy.length - 1] = { who: "bot", text: acc };
                            return copy;
                        });
                    }
                } catch {
                    setMsgs(l => l.concat([{ who: "bot", text: "Standard Core Training Module Response Active: Ensure protein intake fields approach the daily floor optimization metric targets (~1.8g/kg)." }]));
                } finally { setLoading(false); }
            }

            return e("div", { className: "page-animation max-w-3xl mx-auto" }, e(ChatBox, { msgs, input, setInput, loading, send, endRef }));
        }

        function PoseAiPage() {
            const videoRef = React.useRef(null);
            const [streamActive, setStreamActive] = React.useState(false);
            const [err, setErr] = React.useState(null);

            React.useEffect(() => {
                async function setupCamera() {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({
                            video: { width: 640, height: 480, facingMode: "user" },
                            audio: false
                        });
                        if (videoRef.current) {
                            videoRef.current.srcObject = stream;
                            setStreamActive(true);
                        }
                    } catch (e) {
                        setErr("Camera hardware device could not be acquired. Ensure system permissions are granted inside settings.");
                    }
                }
                setupCamera();
                return () => {
                    if (videoRef.current && videoRef.current.srcObject) {
                        videoRef.current.srcObject.getTracks().forEach(track => track.stop());
                    }
                };
            }, []);

            return e("div", { className: "page-animation max-w-2xl mx-auto bg-slate-900 border border-cyan-500/30 p-6 rounded-xl shadow-2xl space-y-4" },
                e("div", { className: "border-b border-slate-800 pb-3" },
                    e("h3", { className: "text-lg font-bold text-cyan-400 flex items-center gap-2" }, 
                        e("span", { className: "w-2 h-2 rounded-full bg-cyan-400" + (streamActive ? " animate-ping" : "") }), 
                        "Biomechanical Pose Alignment tracking"
                    ),
                    e("p", { className: "text-xs text-slate-500 mt-0.5" }, "Direct MediaDevices WebRTC stream alignment interface node.")
                ),
                e("div", { className: "relative aspect-video rounded-lg overflow-hidden bg-slate-950 border border-slate-800 flex items-center justify-center" },
                    err && e("div", { className: "p-4 text-center max-w-sm text-xs text-red-400 font-medium" }, err),
                    !streamActive && !err && e("div", { className: "flex flex-col items-center gap-2" },
                        e("div", { className: "w-6 h-6 border-2 border-t-cyan-400 border-slate-800 rounded-full animate-spin" }),
                        e("div", { className: "text-xs text-slate-500" }, "Mounting native video capture arrays...")
                    ),
                    e("video", {
                        ref: videoRef,
                        autoPlay: true,
                        playsInline: true,
                        muted: true,
                        className: `w-full h-full object-cover scale-x-[-1] ${streamActive ? "block" : "hidden"}`
                    }),
                    streamActive && e("div", { className: "absolute bottom-3 left-3 bg-black/70 px-2 py-1 border border-slate-800 rounded text-[10px] font-mono tracking-widest text-emerald-400" }, "● DEVICE CAPTURE LIVE")
                )
            );
        }

        
        function StaticModulePage({ title, type }) {
            return e("div", { className: "page-animation max-w-3xl mx-auto bg-slate-900/60 border border-slate-800 rounded-2xl p-6" },
                e("h2", { className: "text-xl font-black text-cyan-400 border-b border-slate-800 pb-3 mb-4" }, title),
                e("p", { className: "text-sm text-slate-400 leading-relaxed" }, 
                    `This dedicated console section tracks metrics for ${title}. Interface logs and parameters are running within localized sandboxed frames safely.`
                )
            );
        }

        
        function App() {
            const [currentPage, setCurrentPage] = React.useState("Home");

            function renderPageContent() {
                switch(currentPage) {
                    case "Home": return e(HomePage, { onNavigate: setCurrentPage });
                    case "Profile": return e(ProfilePage);
                    case "Tracker": return e(TrackerPage);
                    case "Chatbot": return e(ChatbotPage);
                    case "BMI Cal": return e(BmiPage);
                    case "Pose AI": return e(PoseAiPage);
                    default: return e(StaticModulePage, { title: currentPage });
                }
            }

            return e("div", { className: "min-h-screen bg-slate-950 text-white font-sans pb-16" },
                
                e("header", { className: "sticky top-0 z-50 bg-black text-white px-8 py-6 border-b border-slate-900 shadow-xl flex justify-between items-center" },
                    e("div", { onClick: () => setCurrentPage("Home"), className: "text-2xl font-black tracking-tight text-white cursor-pointer hover:text-cyan-400 transition" }, "AI Gym"),
                    e("nav", { className: "flex flex-wrap gap-x-8 gap-y-2 text-base md:text-lg font-bold text-slate-200" },
                        [
                            { id: "Home", label: "Home" },
                            { id: "Profile", label: "Profile" },
                            { id: "Diet Recommender", label: "Diet" },
                            { id: "Workout Planner", label: "Workout" },
                            { id: "Tracker", label: "Tracker" },
                            { id: "Chatbot", label: "Chatbot" },
                            { id: "Gym Finder", label: "Gyms" },
                            { id: "Behavior Predictor", label: "Analytics" },
                            { id: "Pose AI", label: "Pose AI" },
                            { id: "BMI Cal", label: "BMI Cal" }
                        ].map(navItem => 
                            e("button", {
                                key: navItem.id,
                                onClick: () => setCurrentPage(navItem.id),
                                className: "hover:text-cyan-400 transition cursor-pointer relative pb-1 " + (currentPage === navItem.id ? "text-cyan-400 font-black" : "")
                            }, 
                                navItem.label,
                                currentPage === navItem.id && e("div", { className: "absolute bottom-0 left-0 right-0 h-0.5 bg-cyan-400" })
                            )
                        )
                    )
                ),
                
                
                e("main", { className: "max-w-4xl mx-auto px-4 mt-12" },
                    renderPageContent()
                ),
                e("footer", { className: "text-center text-xs text-slate-700 mt-20 font-medium" }, "Fitness Assistant Management Panel")
            );
        }

        
        function ChatBox({ msgs, input, setInput, loading, send, endRef }) {
            return e("div", { className: "w-full bg-slate-900/60 border border-slate-800 text-white rounded-xl shadow-2xl p-5" },
                e("h2", { className: "text-2xl font-bold text-center mb-1 text-white" }, "FitBuddy Support Chat"),
                e("p", { className: "text-center text-slate-500 text-xs mb-4" }, "Application Chatbot Console Interface"),
                e("div", { className: "h-80 overflow-y-auto p-3 space-y-3 border border-slate-800/80 bg-slate-950/40 rounded-lg mb-4" },
                    msgs.map((m, i) =>
                        e("div", { key: i, className: "flex " + (m.who === "user" ? "justify-end" : "justify-start") },
                            e("div", { className: "px-4 py-2.5 rounded-xl text-sm max-w-[80%] whitespace-pre-wrap leading-relaxed " + (m.who === "user" ? "bg-cyan-400 text-slate-950 font-medium shadow-md shadow-cyan-950/20" : "bg-slate-800 text-slate-100 border border-slate-700/50") },
                                m.text || "..."
                            )
                        )
                    ),
                    e("div", { ref: endRef })
                ),
                e("div", { className: "flex gap-2 mb-4" },
                    e("input", {
                        type: "text",
                        className: "flex-1 bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400",
                        placeholder: "Ask a fitness question...",
                        value: input,
                        onChange: (ae) => setInput(ae.target.value),
                        onKeyDown: (ae) => ae.key === "Enter" && send()
                    }),
                    e("button", {
                        className: "bg-cyan-400 text-slate-950 font-bold text-sm px-5 py-2.5 rounded-lg hover:bg-cyan-300 transition duration-200 disabled:opacity-50 cursor-pointer shadow-md shadow-cyan-950/30",
                        onClick: () => send(),
                        disabled: loading
                    }, "Send")
                ),
                e("div", { className: "flex flex-wrap gap-2 justify-center" },
                    ["Beginner workout plan", "High protein breakfast", "How to fix bad posture"].map((str, idx) => 
                        e("button", {
                            key: idx,
                            className: "bg-slate-800/50 text-xs text-slate-400 px-3 py-1.5 rounded-full hover:bg-slate-700 hover:text-white border border-slate-700/30 transition cursor-pointer",
                            onClick: () => send(str)
                        }, str)
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
