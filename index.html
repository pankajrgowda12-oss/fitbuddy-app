<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBuddy</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <style>
        .btn {
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            display: inline-block;
            text-decoration: none;
        }
        .btn:hover {
            background: #67e8f9;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const e = React.createElement;

        const API = "https://fitbuddy-backend-qgug.onrender.com";

        const MODULES = [
            { i: "", t: "Workout Planner", d: "Builds a weekly workout plan for you." },
            { i: "", t: "Diet Recommender", d: "Meal plans based on your goal & body stats." },
            { i: "", t: "Behavior Predictor", d: "Predicts adherence and dropout risk." },
            { i: "", t: "Chat Assistant", d: "24x7 fitness chatbot for quick help." },
            { i: "", t: "Pose Detection", d: "Form check using camera (demo only)." },
            { i: "", t: "Gym Finder", d: "Suggests nearby gyms." },
        ];

        function ChatBox() {
            const [msgs, setMsgs] = React.useState([
                { who: "bot", text: "Welcome to FitBuddy. Ask any question regarding your workout or diet routine below." }
            ]);
            const [input, setInput] = React.useState("");
            const [loading, setLoading] = React.useState(false);
            const endRef = React.useRef(null);

            React.useEffect(() => {
                endRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [msgs]);

            async function send(txt) {
                const messageToSend = txt || input;
                if (!messageToSend.trim() || loading) return;

                if (!txt) setInput("");
                setLoading(true);

                setMsgs(l => l.concat([{ who: "user", text: messageToSend }]));

                try {
                    const response = await fetch(`${API}/ask`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message: messageToSend })
                    });

                    if (!response.ok) throw new Error("API Limit reached");

                    const reader = response.body.getReader();
                    const dec = new TextDecoder();
                    let acc = "";

                    setMsgs(l => l.concat([{ who: "bot", text: "..." }]));

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        acc += dec.decode(value, { stream: true });
                        setMsgs(l => {
                            const copy = [...l];
                            copy[copy.length - 1] = { who: "bot", text: acc };
                            return copy;
                        });
                    }
                } catch (err) {
                    const lowerInput = messageToSend.toLowerCase();
                    let fallbackText = "";

                    const fitnessKeywords = [
                        "workout", "plan", "diet", "recipe", "food", "protein", "gym", "exercise", 
                        "posture", "fix", "body", "muscle", "gain", "lose", "weight", "fat", "calories",
                        "breakfast", "lunch", "dinner", "healthy", "routine", "hour", "time", "train", "suggest"
                    ];

                    const isFitnessRelated = fitnessKeywords.some(keyword => lowerInput.includes(keyword));

                    if (isFitnessRelated) {
                        if (lowerInput.includes("recipe") || lowerInput.includes("food") || lowerInput.includes("diet") || lowerInput.includes("breakfast") || lowerInput.includes("protein")) {
                            fallbackText = "High-Protein Recipe Selection:\n\nIngredients:\n- 3 egg whites, 1 whole egg\n- 50g oats\n- 1 scoop protein powder\n- Fresh berries\n\nInstructions:\n1. Scramble the eggs in a pan with a splash of olive oil.\n2. Mix the protein powder into warm oatmeal and top with berries.\n\nMacros: Approximately 45g Protein / 40g Carbs / 12g Fat.";
                        } else if (lowerInput.includes("posture") || lowerInput.includes("fix")) {
                            fallbackText = "Posture Correction Routine:\n\n- Chin Tucks: 3 sets of 10 reps to strengthen neck muscles.\n- Wall Angels: 3 sets of 12 reps to open tight shoulders and chest.\n- Planks: Hold for 45 seconds to strengthen core stability.";
                        } else if (lowerInput.includes("hour") || lowerInput.includes("time") || lowerInput.includes("long")) {
                            fallbackText = "Training Optimization Note: Training sessions exceeding 90 minutes can elevate cortisol levels and limit overall muscle recovery. It is recommended to keep weight training sessions structured between 45 to 90 minutes for optimal intensity and performance outcomes.";
                        } else {
                            fallbackText = "Custom Fitness Strategy:\n\nWeekly Workout Layout:\n- Monday: Push Selection (Chest, Shoulders, Triceps)\n- Wednesday: Pull Selection (Back, Biceps)\n- Friday: Lower Body Selection (Squats, Lunges, Calves)\n\nNutritional Focus: Prioritize lean proteins such as chicken, fish, or tofu alongside complex carbohydrate sources to appropriately fuel training goals.";
                        }
                    } else {
                        fallbackText = "This platform is dedicated exclusively to fitness, workout programming, and nutritional guidance. Please submit a query related to these operational domains.";
                    }

                    setMsgs(l => l.concat([
                        { who: "bot", text: fallbackText }
                    ]));
                } finally {
                    setLoading(false);
                }
            }

            return e("div", { className: "card p-4 max-w-2xl mx-auto bg-slate-900 text-white rounded-xl shadow-lg mt-10" },
                e("h2", { className: "text-2xl font-bold text-center mb-4" }, "FitBuddy Support Chat"),
                e("p", { className: "text-center text-slate-400 text-sm mb-6" }, "Application Interface Client Terminal"),
                e("div", { className: "h-72 overflow-y-auto p-2 space-y-2 border border-slate-700 rounded-lg mb-4" },
                    msgs.map((m, i) =>
                        e("div", { key: i, className: "flex " + (m.who === "user" ? "justify-end" : "justify-start") },
                            e("div", { className: "px-3 py-2 rounded-lg max-w-[75%] white-space-pre-wrap " + (m.who === "user" ? "bg-cyan-400 text-slate-900" : "bg-slate-800 text-slate-200") },
                                m.text || "..."
                            )
                        )
                    ),
                    e("div", { ref: endRef })
                ),
                e("div", { className: "flex gap-2 mb-4" },
                    e("input", {
                        type: "text",
                        className: "flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-cyan-400",
                        placeholder: "Enter question...",
                        value: input,
                        onChange: (ae) => setInput(ae.target.value),
                        onKeyDown: (ae) => ae.key === "Enter" && send()
                    }),
                    e("button", {
                        className: "bg-cyan-400 text-slate-900 font-bold px-4 py-2 rounded-lg hover:bg-cyan-300 disabled:opacity-50",
                        onClick: () => send(),
                        disabled: loading
                    }, "Send")
                ),
                e("div", { className: "flex flex-wrap gap-2 justify-center" },
                    ["Beginner workout plan", "High protein breakfast", "How to fix bad posture"].map((str, idx) => 
                        e("button", {
                            key: idx,
                            className: "bg-slate-800 text-xs text-slate-400 px-3 py-1.5 rounded-full hover:bg-slate-700",
                            onClick: () => send(str)
                        }, str)
                    )
                )
            );
        }

        function App() {
            return e("div", { className: "min-h-screen bg-slate-950 text-white font-sans pb-10" },
                e("header", { className: "flex justify-between items-center px-6 py-4 border-b border-slate-800" },
                    e("div", { className: "text-2xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent" }, "FitBuddy"),
                    e("nav", { className: "space-x-5 text-sm text-slate-300" },
                        e("a", { href: "#mods", className: "hover:text-white" }, "Modules"),
                        e("a", { href: "#chat", className: "hover:text-white" }, "Chat")
                    )
                ),
                e("section", { className: "text-center px-4 py-16" },
                    e("h1", { className: "text-5xl font-extrabold leading-snug mb-4" },
                        "Personal Training and Fitness Systems"
                    ),
                    e("p", { className: "mt-4 text-slate-400 max-w-xl mx-auto" },
                        "Structured resource program to help organize workouts, coordinate meal planning, and track operational metrics."
                    ),
                    e("div", { className: "mt-6" },
                        e("a", { href: "#chat", className: "btn bg-cyan-400 text-slate-900 hover:bg-cyan-300" }, "Open Chat Console")
                    )
                ),
                e("main", { className: "max-w-4xl mx-auto px-4 space-y-16" },
                    e("div", { id: "mods" },
                        e("h2", { className: "text-2xl font-bold mb-6 text-center" }, "Features"),
                        e("div", { className: "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" },
                            MODULES.map((m, i) => 
                                e("div", { key: i, className: "bg-slate-900 p-5 rounded-xl border border-slate-800" },
                                    e("h3", { className: "font-bold text-lg mb-1" }, m.t),
                                    e("p", { className: "text-slate-400 text-sm" }, m.d)
                                )
                            )
                        )
                    ),
                    e("div", { id: "chat", className: "pt-8" },
                        e(ChatBox)
                    )
                ),
                e("footer", { className: "text-center text-xs text-slate-600 mt-16" }, "Fitness Assistant Management Panel")
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
